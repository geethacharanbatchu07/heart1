<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Disease Predictor</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1d2671, #c33764);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            width: 100%;
            max-width: 850px;
            padding: 20px;
        }
        
        .card {
            background: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
        }
        
        h1 {
            margin-bottom: 10px;
            color: #333;
        }
        
        .subtitle {
            color: #777;
            margin-bottom: 20px;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        
        input {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: 0.3s;
        }
        
        input:focus {
            border-color: #6c63ff;
            outline: none;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: #6c63ff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        
        button:hover {
            background: #574fd6;
        }
        
        .result {
            margin-top: 20px;
            padding: 15px;
            background: #f1f3f6;
            border-radius: 8px;
            font-weight: bold;
            color: #333;
        }
        
        @media (max-width: 600px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="card">

            <h1>❤️ Heart Disease Predictor</h1>
            <p class="subtitle">Enter patient details to assess risk</p>

            <form action="/predict" method="post">
                <div class="grid">

                    <input type="number" name="age" placeholder="Age" required>
                    <input type="number" name="sex" placeholder="Sex (0=F, 1=M)" required>
                    <input type="number" name="cp" placeholder="Chest Pain Type (0-3)" required>
                    <input type="number" name="trestbps" placeholder="Resting BP" required>
                    <input type="number" name="chol" placeholder="Cholesterol" required>

                    <input type="number" name="fbs" placeholder="Fasting Blood Sugar (0/1)">
                    <input type="number" name="restecg" placeholder="ECG Results (0-2)">
                    <input type="number" name="thalach" placeholder="Max Heart Rate">
                    <input type="number" name="exang" placeholder="Exercise Angina (0/1)">
                    <input type="number" step="any" name="oldpeak" placeholder="ST Depression">

                    <input type="number" name="slope" placeholder="Slope (0-2)">
                    <input type="number" name="ca" placeholder="Major Vessels (0-3)">
                    <input type="number" name="thal" placeholder="Thal (1-3)">

                </div>

                <button type="submit">Predict</button>
            </form>

            {% if prediction_text %}
            <div class="result">
                {{ prediction_text }}
            </div>
            {% endif %}

        </div>
    </div>

</body>

</html>
